<!DOCTYPE html>

<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Server Log</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: #0d1117;
      color: white;
    }

    h1 {
      color: #00ff66;
      margin-bottom: 16px;
    }

    .top-bar {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      background: #00ff66;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    #lastUpdate {
      color: #b5b5b5;
      font-size: 14px;
    }

    .group {
      margin-bottom: 20px;
      padding: 14px;
      border-radius: 12px;
      max-height: 260px;
      overflow-y: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.35);
    }

    .group h3 {
      margin-top: 0;
      position: sticky;
      top: 0;
      background: inherit;
      padding-bottom: 8px;
    }

    .booking-group {
      background: #08253d;
      border-left: 5px solid #00bfff;
    }

    .prepare-group {
      background: #3d3200;
      border-left: 5px solid #ffe600;
    }

    .commit-group {
      background: #00331f;
      border-left: 5px solid #00ff66;
    }

    .error-group {
      background: #3a0000;
      border-left: 5px solid #ff4d4d;
    }

    .all-group {
      background: #1f2937;
      border-left: 5px solid #8b949e;
    }

    .log {
      font-family: Consolas, monospace;
      font-size: 13px;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      word-break: break-word;
    }

    .booking-log { color: #66ccff; }
    .prepare-log { color: #ffe066; }
    .commit-log { color: #00ff88; }
    .error-log { color: #ff6b6b; }

    .empty {
      color: #b5b5b5;
      font-style: italic;
    }
  </style>

</head>
<body>

  <h1>🖥 Server Log (Tất cả server)</h1>

  <div class="top-bar">
    <button onclick="loadLog()">🔄 Tải log</button>
    <div id="lastUpdate">Chưa cập nhật</div>
  </div>

  <div class="group booking-group">
    <h3>📥 Booking Server</h3>
    <div id="booking"></div>
  </div>

  <div class="group prepare-group">
    <h3>📦 PREPARE</h3>
    <div id="prepare"></div>
  </div>

  <div class="group commit-group">
    <h3>✅ COMMIT / VOTE OK</h3>
    <div id="commit"></div>
  </div>

  <div class="group error-group">
    <h3>❌ ERROR / FAIL / ABORT</h3>
    <div id="error"></div>
  </div>

  <div class="group all-group">
    <h3>📋 Tất cả log</h3>
    <div id="all"></div>
  </div>

  <script>
  const servers = [
    {
      name: "Server 1",
      url: "https://dien-toan-lan-hai.onrender.com"
    },
    {
      name: "Booking Server",
      url: "https://hotel-booking-system-new.onrender.com"
    },
    {
      name: "Server 3",
      url: "https://dientoanck.onrender.com"
    }
  ];

  function convertUTCToVN(log) {
    const match = log.match(/\[(.*?)\]/);

    if (!match) return log;

    const rawTime = match[1];

    // chỉ đổi nếu log đang ở dạng UTC/ISO
    if (rawTime.includes("T") || rawTime.includes("Z")) {
      const date = new Date(rawTime);

      if (!isNaN(date)) {
        const vnTime = date.toLocaleString("vi-VN", {
          timeZone: "Asia/Ho_Chi_Minh"
        });

        return log.replace(`[${rawTime}]`, `[${vnTime}]`);
      }
    }

    return log;
  }

  async function loadLog() {
    ["booking", "prepare", "commit", "error", "all"].forEach(id => {
      document.getElementById(id).innerHTML =
        '<div class="empty">Đang tải...</div>';
    });

    const bookingLogs = [];
    const prepareLogs = [];
    const commitLogs = [];
    const errorLogs = [];
    const allLogs = [];

    await Promise.all(
      servers.map(async server => {
        try {
          const response = await fetch(
            `${server.url}/api/log?t=${Date.now()}`,
            {
              method: "GET",
              cache: "no-store"
            }
          );

          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          const data = await response.json();

          if (!Array.isArray(data)) {
            throw new Error("/api/log không trả về mảng");
          }

          if (data.length === 0) {
            const msg = `<div class="log error-log">⚠️ [${server.name}] Không có log</div>`;
            allLogs.unshift(msg);
            return;
          }

          [...data].reverse().forEach(log => {
            log = convertUTCToVN(log);

            const fullLog = `[${server.name}] ${log}`;
            const upper = fullLog.toUpperCase();

            allLogs.unshift(
              `<div class="log">${fullLog}</div>`
            );

            if (server.name === "Booking Server") {
              bookingLogs.unshift(
                `<div class="log booking-log">${fullLog}</div>`
              );
            }

            if (upper.includes("PREPARE")) {
              prepareLogs.unshift(
                `<div class="log prepare-log">${fullLog}</div>`
              );
            }

            if (
              upper.includes("COMMIT") ||
              upper.includes("VOTE OK") ||
              upper.includes("BOOKING SUCCESS") ||
              upper.includes("ĐẶT PHÒNG THÀNH CÔNG")
            ) {
              commitLogs.unshift(
                `<div class="log commit-log">${fullLog}</div>`
              );
            }

            if (
              upper.includes("ERROR") ||
              upper.includes("FAIL") ||
              upper.includes("ABORT") ||
              upper.includes("DOWN")
            ) {
              errorLogs.unshift(
                `<div class="log error-log">${fullLog}</div>`
              );
            }
          });

        } catch (err) {
          const message = `<div class="log error-log">❌ [${server.name}] Không thể tải log: ${err.message}</div>`;

          errorLogs.unshift(message);
          allLogs.unshift(message);
        }
      })
    );

    document.getElementById("booking").innerHTML =
      bookingLogs.length
        ? bookingLogs.join("")
        : '<div class="empty">Không có log từ Booking Server</div>';

    document.getElementById("prepare").innerHTML =
      prepareLogs.length
        ? prepareLogs.join("")
        : '<div class="empty">Không có log PREPARE</div>';

    document.getElementById("commit").innerHTML =
      commitLogs.length
        ? commitLogs.join("")
        : '<div class="empty">Chưa có log COMMIT</div>';

    document.getElementById("error").innerHTML =
      errorLogs.length
        ? errorLogs.join("")
        : '<div class="empty">Không có log ERROR</div>';

    document.getElementById("all").innerHTML =
      allLogs.length
        ? allLogs.join("")
        : '<div class="empty">Không có log nào</div>';

    document.getElementById("lastUpdate").innerText =
      "Cập nhật lúc: " +
      new Date().toLocaleTimeString("vi-VN", {
        timeZone: "Asia/Ho_Chi_Minh"
      });
  }

  window.onload = () => {
    loadLog();
    setInterval(loadLog, 6000);
  };
</script>

</body>
</html>
